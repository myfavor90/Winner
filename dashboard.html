<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VTU Hub | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-tower-cell"></i>
                <h3>VTU Hub</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="dashboard">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-section="purchase">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Buy Airtime/Data</span>
                </a>
                <a href="#" class="nav-item" data-section="history">
                    <i class="fas fa-history"></i>
                    <span>Transaction History</span>
                </a>
                <a href="#" class="nav-item" data-section="funds">
                    <i class="fas fa-wallet"></i>
                    <span>Add Funds</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="user-greeting">
                    <i class="fas fa-user-circle"></i>
                    <span>Welcome, <strong id="userName"></strong></span>
                </div>
                <div class="balance-card">
                    <i class="fas fa-coins"></i>
                    <span>Balance: <strong id="userBalance">0.00</strong> NGN</span>
                </div>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboardSection" class="section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-phone-alt"></i>
                        <h3>Airtime</h3>
                        <p>Instant top-up</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-wifi"></i>
                        <h3>Data Plans</h3>
                        <p>Affordable bundles</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-chart-line"></i>
                        <h3>Total Spent</h3>
                        <p id="totalSpent">0.00 NGN</p>
                    </div>
                </div>
                <div class="recent-transactions">
                    <h3><i class="fas fa-clock"></i> Recent Transactions</h3>
                    <div id="recentTransactionsList">
                        <div class="loading-spinner">
                            <i class="fas fa-spinner fa-spin"></i> Loading...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Purchase Section -->
            <div id="purchaseSection" class="section">
                <div class="card">
                    <h3><i class="fas fa-shopping-cart"></i> Buy Airtime / Data</h3>
                    <form id="purchaseForm">
                        <div class="input-group">
                            <i class="fas fa-tag"></i>
                            <select id="serviceType" required>
                                <option value="airtime">📱 Airtime</option>
                                <option value="data">🌐 Data Bundle</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-phone-alt"></i>
                            <input type="tel" id="phoneNumber" placeholder="Phone Number (e.g., 08012345678)" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-naira-sign"></i>
                            <input type="number" id="amount" placeholder="Amount (NGN)" required min="10" step="10">
                        </div>
                        <button type="submit" id="purchaseBtn" class="btn-primary">Purchase <i class="fas fa-arrow-right"></i></button>
                    </form>
                    <div id="purchaseMessage" class="message"></div>
                </div>
            </div>

            <!-- History Section -->
            <div id="historySection" class="section">
                <div class="card">
                    <h3><i class="fas fa-history"></i> All Transactions</h3>
                    <div id="transactionsList">
                        <div class="loading-spinner">
                            <i class="fas fa-spinner fa-spin"></i> Loading transactions...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Add Funds Section -->
            <div id="fundsSection" class="section">
                <div class="card">
                    <h3><i class="fas fa-wallet"></i> Add Funds to Wallet</h3>
                    <form id="addFundsForm">
                        <div class="input-group">
                            <i class="fas fa-naira-sign"></i>
                            <input type="number" id="fundAmount" placeholder="Amount to add (NGN)" required min="100" step="100">
                        </div>
                        <button type="submit" id="addFundsBtn" class="btn-primary">Add Funds <i class="fas fa-plus-circle"></i></button>
                    </form>
                    <div id="fundsMessage" class="message"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
